# ============================================================================
# bandwidth_max.conf — Maximum bandwidth constraint for adaptive streaming
# ============================================================================
# This file sets the maximum bandwidth available for streaming.
# When enabled, copt will automatically adjust encoding profiles to fit
# within this bandwidth limit by reducing resolution, framerate, or bitrate.
#
# Set COPT_BANDWIDTH_MAX_MBPS to your maximum upload bandwidth in Mbps.
# Leave empty or set to 0 to disable bandwidth adaptation.
#
# Example bandwidth targets:
#   - 5 Mbps:  Typical home upload (ADSL/basic cable)
#   - 10 Mbps: Standard broadband upload
#   - 20 Mbps: Good fibre upload
#   - 50+ Mbps: High-speed fibre
#
# Usage:
#   1. Set your max bandwidth below
#   2. Use a profile: copt --profile 4k60
#   3. copt will auto-adjust to fit within your bandwidth limit
#
# SPDX-License-Identifier: GPL-3.0-or-later
# ============================================================================

# Maximum bandwidth in Mbps (0 = no limit)
COPT_BANDWIDTH_MAX_MBPS=0
