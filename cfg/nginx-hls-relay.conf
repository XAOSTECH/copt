# ============================================================================
# nginx HLS relay for YouTube Live streaming
# ============================================================================
# Accepts HLS segments from FFmpeg locally (fast), then uploads to YouTube
# asynchronously with persistent connections. Solves upload blocking issues.
#
# Usage:
#   nginx -c /path/to/nginx-hls-relay.conf
#
# FFmpeg writes to: http://localhost:8080/hls/stream.m3u8
# nginx uploads to: YouTube HLS URL (configured via environment or config)
# ============================================================================

daemon off;
worker_processes auto;
error_log /tmp/nginx-hls-error.log warn;
pid /tmp/nginx-hls.pid;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/nginx-hls-access.log;
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    # HLS relay server
    server {
        listen 8080;
        server_name localhost;

        # Increase timeouts for slow YouTube uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;
        
        # Enable persistent connections to YouTube
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Large body sizes for HLS segments
        client_max_body_size 50M;
        client_body_buffer_size 10M;

        # Local HLS endpoint (FFmpeg writes here)
        location /hls/ {
            # Store segments locally first
            root /tmp/nginx-hls-store;
            dav_methods PUT DELETE;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;
            
            # CORS for debugging
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;
            
            # HLS MIME types
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # Health check
        location /health {
            return 200 "nginx HLS relay OK\n";
            add_header Content-Type text/plain;
        }
    }
}
