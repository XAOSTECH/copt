# ===========================================================================
# copt profile: 1080p60  —  1080p SDR @ 60fps, RTMPS  (canonical)
# ===========================================================================
# UGREEN 25173 (3188:1000) — NV12 mode, 1920×1080 @ 60fps
# Standard Rec.709 SDR. No colorspace reinterpretation — device output
# matches V4L2 descriptor at this resolution/framerate.
#
# Usage:  copt --rtmp --profile=1080p60
# Max upload headroom: 17 Mbps (safe for 18 Mbps connection)
# ===========================================================================

COPT_CAPTURE_MODE=usb
COPT_USB_VID_PID=3188:1000
COPT_USB_INPUT_FORMAT=nv12
COPT_USB_INPUT_W=1920
COPT_USB_INPUT_H=1080

COPT_OUT_W=1920
COPT_OUT_H=1080
COPT_FRAMERATE=60
COPT_PIXEL_FMT=yuv420p
COPT_QUALITY=20
COPT_ENCODER=hevc

# SDR — Rec.709. No COPT_COLOR_* set; input descriptor is correct at 1080p.

COPT_BITRATE_VIDEO=17000k
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=34000k
COPT_GOP_SIZE=120
COPT_AUDIO_CODEC=aac

COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=0
COPT_USB_RECONNECT_TIMEOUT=120
COPT_USB_RECONNECT_DELAY=5
COPT_USB_SETTLE_DELAY=2

