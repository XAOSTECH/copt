# ============================================================================
# copt profile: 1080p @ 60fps
# ============================================================================
# High framerate 1080p streaming/recording
# Suitable for: gaming, fast motion, smooth playback
# ============================================================================

COPT_OUT_W=1920
COPT_OUT_H=1080
COPT_FRAMERATE=60
COPT_PIXEL_FMT=nv12
COPT_QUALITY=20                       # Lower CRF for high motion
COPT_ENCODER=auto                     # Prefer hardware encoding

# Streaming settings
COPT_BITRATE_VIDEO=6000k              # YouTube recommended for 1080p60
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=12000k
COPT_GOP_SIZE=120                     # 2-second GOP at 60fps
