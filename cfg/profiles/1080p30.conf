# ============================================================================
# copt profile: 1080p @ 30fps
# ============================================================================
# Standard 1080p streaming/recording at 30fps
# Suitable for: streaming, lower bandwidth, battery saving
# ============================================================================

COPT_OUT_W=1920
COPT_OUT_H=1080
COPT_FRAMERATE=30
COPT_PIXEL_FMT=nv12
COPT_QUALITY=23                       # Slightly higher CRF for 30fps
COPT_ENCODER=auto                     # Prefer hardware encoding

# Streaming settings
COPT_BITRATE_VIDEO=4500k              # YouTube recommended for 1080p30
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=9000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps
