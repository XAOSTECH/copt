# ============================================================================
# copt profile: USB capture — 4K @ 30fps (USB-C port)
# ============================================================================
# For UGREEN 25173 (VID:PID 3188:1000) connected via USB-C.
# Device enumerates at 3840x2160 via USB-C but hardware instability causes
# disconnects after 7-13 minutes — USB reconnect is enabled by default.
#
# Usage:
#   sudo copt --capture-mode usb --profile usb-capture-4k30 -o ~/capture.mkv
#
# Hardware notes:
#   • USB-C gives 4K but ASRock USB-C controller may cause disconnects.
#   • Prefer replacing USB-C cable / updating motherboard BIOS first.
#   • If disconnects persist, fall back to usb-capture-1080p30 on USB 3.0.
# ============================================================================

# Capture mode
COPT_CAPTURE_MODE=usb

# USB device identity
COPT_USB_VID_PID=3188:1000            # UGREEN 25173
COPT_USB_INPUT_FORMAT=mjpeg           # USB-C 4K only available via MJPEG
COPT_USB_INPUT_W=3840
COPT_USB_INPUT_H=2160

# Output encoding
COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=nv12
COPT_QUALITY=22
COPT_ENCODER=auto                     # Strongly recommend VAAPI or NVENC

# Streaming settings (YouTube 4K30 SDR)
COPT_BITRATE_VIDEO=13000k
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=26000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps

# USB reconnect — always on for this profile
COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=0             # Infinite — keep going until user stops
COPT_USB_RECONNECT_TIMEOUT=120        # 2 min to wait for device bus reappearance
COPT_USB_RECONNECT_DELAY=5
COPT_USB_SETTLE_DELAY=2
