# ============================================================================
# copt profile: 4K HDR @ 30fps
# ============================================================================
# Ultra HD 4K HDR (High Dynamic Range) streaming/recording
# Suitable for: professional HDR content, cinematic recording
# Requires: NVENC (Pascal+) or VAAPI with HEVC 10-bit support
# Format: HDR10 (BT.2020, PQ/ST2084, 10-bit)
# ============================================================================

COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=p010le                 # 10-bit pixel format for HDR
COPT_QUALITY=20                       # Lower CRF for HDR quality
COPT_ENCODER=hevc                     # Force HEVC for HDR

# HDR metadata
COPT_COLORSPACE=bt2020nc              # BT.2020 non-constant luminance
COPT_COLOR_PRIMARIES=bt2020
COPT_COLOR_TRC=smpte2084              # PQ transfer (HDR10)
COPT_COLOR_RANGE=tv                   # Limited range

# Streaming settings
COPT_BITRATE_VIDEO=25000k             # YouTube recommended for 4K HDR30
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=50000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps

# HDR-specific encoder settings
COPT_HDR_MASTER_DISPLAY="G(13250,34500)B(7500,3000)R(34000,16000)WP(15635,16450)L(10000000,1)"
COPT_HDR_MAX_CLL="1000,400"           # MaxCLL, MaxFALL in nits
