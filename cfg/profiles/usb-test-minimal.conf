# ============================================================================
# copt profile: USB capture — 4K @ 30fps ABSOLUTE MINIMAL (raw → h265 → HLS)
# ============================================================================
# NO FILTERS, NO FORMAT CONVERSIONS, NO HWUPLOAD
# Just: V4L2 input → h265 encoder → HLS output

# Capture mode
COPT_CAPTURE_MODE=usb

# USB device
COPT_USB_VID_PID=3188:1000
COPT_USB_INPUT_FORMAT=yuv420p
COPT_USB_INPUT_W=3840
COPT_USB_INPUT_H=2160

# Output encoding — H265 ONLY (2026, not h264)
COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=nv12
COPT_QUALITY=20
COPT_ENCODER=hevc                     # Use h265 (hevc_nvenc preferred, CPU fallback)

# HDR10 colour metadata — PQ10 + Rec.2100 for full HDR
COPT_COLORSPACE=bt2100-pq

# Streaming — YouTube 4K HLS
COPT_STREAM_TYPE=hls                  # HLS protocol (not RTMP)
COPT_BITRATE_VIDEO=13000k
COPT_BUFFER_SIZE=26000k
COPT_GOP_SIZE=60

# DISABLED: audio, HDR, logos, all fancy stuff
COPT_AUDIO=0
COPT_LOGO_DETECT=0

# USB reconnect
COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=0
COPT_USB_RECONNECT_TIMEOUT=120
COPT_USB_RECONNECT_DELAY=5
COPT_USB_SETTLE_DELAY=2
