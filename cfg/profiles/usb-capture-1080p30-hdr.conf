# ============================================================================
# copt profile: USB Capture 1080p HDR @ 30fps (P010 native)
# ============================================================================
# NATIVE HDR capture from USB (P010 input) → HEVC Main 10 output
# This profile uses P010 format directly from the USB device 
# which now supports it after kernel patch installation
# ============================================================================

COPT_CAPTURE_MODE=usb
COPT_OUT_W=1920
COPT_OUT_H=1080
COPT_FRAMERATE=30
COPT_PIXEL_FMT=p010le                 # Direct P010 from USB device

# USB device setup
COPT_USB_VID_PID=3188:1000
COPT_USB_INPUT_FORMAT=p010             # Native P010 from USB (HDR)
COPT_AUDIO_DEVICE=hw:1,0               # Auto-detect ALSA device

# Encoder settings for HDR10
COPT_QUALITY=20
COPT_ENCODER=hevc
COPT_ENCODER_PRESET=p4
COPT_TUNE=ll                           # Low-latency

# Codec Profile - Main 10 for HDR10
COPT_PROFILE=main10
COPT_TAG=hvc1

# Rate control for streaming
COPT_RC=vbr
COPT_BITRATE_VIDEO=12000k              # 1080p30 HDR
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=24000k
COPT_GOP_SIZE=60                       # 2-second GOP at 30fps

# Streaming settings
COPT_STREAM_TYPE=hls

# Reconnect behavior
COPT_AUTORECONNECT=1
COPT_RECONNECT_MAX=0                   # Infinite reconnect

# Metadata for colorspace (applied at encode, not input)
COPT_COLORSPACE=bt2020nc
COPT_COLOR_PRIMARIES=bt2020
COPT_COLOR_TRANSFER=smpte2084          # PQ for HDR10
COPT_COLOR_RANGE=limited
