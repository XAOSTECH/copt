# ============================================================================
# copt profile: 4K @ 60fps
# ============================================================================
# Ultra HD 4K streaming/recording at 60fps
# Suitable for: professional content, high-motion 4K gaming
# Requires: powerful GPU (NVENC Turing+ or equivalent)
# ============================================================================

COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=60
COPT_PIXEL_FMT=nv12
COPT_QUALITY=20                       # Lower CRF for high bitrate
COPT_ENCODER=auto                     # Requires NVENC/VAAPI for real-time

# Streaming settings
COPT_BITRATE_VIDEO=20000k             # YouTube recommended for 4K60 SDR
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=40000k
COPT_GOP_SIZE=120                     # 2-second GOP at 60fps
