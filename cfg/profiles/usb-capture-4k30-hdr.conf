# ============================================================================
# copt profile: USB capture — 4K @ 30fps HDR10 PQ → YouTube HLS
# ============================================================================
# For UGREEN 25173 (VID:PID 3188:1000).
#
# The device receives an HDR10 HDMI signal and encodes it into a standard
# 8-bit YUV 4:2:0 stream using BT.2020 primaries and the PQ (ST2084)
# transfer function — the HDR colour information is carried in-band within
# the 8-bit signal values.  No tone-mapping or simulation is involved.
#
# FFmpeg pipeline:
#   V4L2 yuv420p 8-bit  →  setparams (tag BT.2020/PQ, override V4L2's
#   default BT.709 assumption)  →  format=p010le (bit-depth expand ×4,
#   left-shift only, no tone-map)  →  hwupload  →  hevc_nvenc/hevc_vaapi
#   Main10  →  RTMP/HLS with HDR10 SEI metadata
#
# Usage:
#   sudo copt --capture-mode usb --profile usb-capture-4k30-hdr \
#             --hls --hls-url https://... -y YOUR_STREAM_KEY
#
#   Or via copt-host.sh (wraps with autorestart + VID:PID discovery):
#   copt-host --hls --hls-url https://... -y YOUR_STREAM_KEY
# ============================================================================

# Capture mode
COPT_CAPTURE_MODE=usb

# USB device — identified by VID:PID only (no /dev/videoX index hardcoding)
COPT_USB_VID_PID=3188:1000
COPT_USB_DEVICE=""                    # auto-detect via VID:PID

# V4L2 input: device outputs YU12 (planar YUV 4:2:0) carrying BT.2020/PQ
COPT_USB_INPUT_FORMAT=yuv420p
COPT_USB_INPUT_W=3840
COPT_USB_INPUT_H=2160

# Output encoding
COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=p010le                 # 10-bit: expanded from 8-bit PQ input
COPT_QUALITY=20
COPT_ENCODER=hevc                     # HEVC Main10 (hevc_nvenc or hevc_vaapi)

# HDR10 colour metadata — must match what the card sends
COPT_COLORSPACE=bt2020nc              # BT.2020 non-constant luminance
COPT_COLOR_PRIMARIES=bt2020
COPT_COLOR_TRC=smpte2084              # PQ / ST.2084
COPT_COLOR_RANGE=tv                   # Limited (16–235 / 16–240)

# HDR10 static metadata (SEI mastering display + MaxCLL)
COPT_HDR_MASTER_DISPLAY="G(13250,34500)B(7500,3000)R(34000,16000)WP(15635,16450)L(10000000,1)"
COPT_HDR_MAX_CLL="1000,400"           # MaxCLL=1000 nits, MaxFALL=400 nits

# Streaming — YouTube recommended for 4K HDR30
COPT_BITRATE_VIDEO=25000k
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=50000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps
COPT_AUDIO_CODEC=aac

# USB disconnect auto-reconnect
COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=0             # Infinite
COPT_USB_RECONNECT_TIMEOUT=120
COPT_USB_RECONNECT_DELAY=5
COPT_USB_SETTLE_DELAY=2
