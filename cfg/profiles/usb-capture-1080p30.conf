# ============================================================================
# copt profile: USB capture — 1080p @ 30fps (USB 3.0 back port)
# ============================================================================
# For UGREEN 25173 (VID:PID 3188:1000) on USB 3.0 back port.
# The device is stable on USB 3.0 but only enumerates up to 1280x720 (YUYV)
# or 1920x1080 (MJPEG).  This profile uses MJPEG at 1080p30, which is stable.
#
# Usage:
#   sudo copt --capture-mode usb --profile usb-capture-1080p30 -o ~/capture.mkv
#
# Hardware notes:
#   • USB 3.0 back port = stable, but no 4K bandwidth.
#   • If you need 4K, use the USB-C port with the usb-capture-4k30 profile
#     and accept that reconnect may trigger every ~10 minutes.
# ============================================================================

# Capture mode
COPT_CAPTURE_MODE=usb

# USB device identity
COPT_USB_VID_PID=3188:1000            # UGREEN 25173
COPT_USB_INPUT_FORMAT=mjpeg           # MJPEG allows 1080p over USB 3.0
COPT_USB_INPUT_W=1920
COPT_USB_INPUT_H=1080

# Output encoding
COPT_OUT_W=1920
COPT_OUT_H=1080
COPT_FRAMERATE=30
COPT_PIXEL_FMT=nv12
COPT_QUALITY=20
COPT_ENCODER=auto

# Streaming settings (YouTube 1080p30)
COPT_BITRATE_VIDEO=4500k
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=9000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps

# USB reconnect — on as a precaution, but USB 3.0 back port is stable
COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=10            # More conservative — 10 tries then bail
COPT_USB_RECONNECT_TIMEOUT=60
COPT_USB_RECONNECT_DELAY=3
COPT_USB_SETTLE_DELAY=2
