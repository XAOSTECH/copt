# ============================================================================
# copt profile: 4K @ 30fps
# ============================================================================
# Ultra HD 4K streaming/recording at 30fps
# Suitable for: high-quality content, cinematic recording
# Requires: powerful GPU for hardware encoding
# ============================================================================

COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=nv12
COPT_QUALITY=22                       # Balance quality/size for 4K
COPT_ENCODER=auto                     # Strongly recommend NVENC/VAAPI

# Streaming settings
COPT_BITRATE_VIDEO=13000k             # YouTube recommended for 4K30 SDR
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=26000k
COPT_GOP_SIZE=60                      # 2-second GOP at 30fps
