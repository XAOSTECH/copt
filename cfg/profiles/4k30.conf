# ===========================================================================
# copt profile: 4k30  —  4K HDR10 @ 30fps  (canonical)
# ===========================================================================
# UGREEN 25173 (3188:1000) — NV12 mode
# Device on-board DSP captures HDMI HDR and encodes into 8-bit NV12.
# V4L2 descriptor lies (reports sRGB/Rec.709); pixel values are genuine HDR.
# Pipeline: V4L2 NV12 HDR → bit-expand to p010le → hevc_nvenc Main10 + SEI.
#
# Usage:  copt --hls --profile=4k30
# ===========================================================================

COPT_CAPTURE_MODE=usb
COPT_USB_VID_PID=3188:1000
COPT_USB_INPUT_FORMAT=nv12
COPT_USB_INPUT_W=3840
COPT_USB_INPUT_H=2160

COPT_OUT_W=3840
COPT_OUT_H=2160
COPT_FRAMERATE=30
COPT_PIXEL_FMT=p010le
COPT_QUALITY=20
COPT_ENCODER=hevc

# Input-side colorspace — prevents FFmpeg implicit matrix conversion.
# setparams filter stamps per-frame AVFrame metadata so NVENC emits SEI.
COPT_COLOR_PRIMARIES=bt2020
COPT_COLOR_TRC=smpte2084
COPT_COLORSPACE=bt2020nc

COPT_BITRATE_VIDEO=17000k
COPT_BITRATE_AUDIO=192k
COPT_BUFFER_SIZE=34000k
COPT_GOP_SIZE=60
COPT_AUDIO_CODEC=aac

COPT_USB_RECONNECT=1
COPT_USB_MAX_RECONNECTS=0
COPT_USB_RECONNECT_TIMEOUT=120
COPT_USB_RECONNECT_DELAY=5
COPT_USB_SETTLE_DELAY=2

