# ============================================================================
# copt — Default configuration
# ============================================================================
# All settings are overridable via environment, config file, or CLI flags.
# Priority order: CLI > config file > environment > defaults
# ============================================================================

# Hardware
COPT_DRI_DEVICE=""                    # Auto-detect DRI device
COPT_AUDIO_DEVICE=""                  # Auto-detect ALSA device

# Screen resolution (auto-detected via xrandr/weston-info)
COPT_SCREEN_W=1920
COPT_SCREEN_H=1080

# Output resolution
COPT_OUT_W=1920
COPT_OUT_H=1080

# Crop region
COPT_CROP_X=0
COPT_CROP_Y=0
COPT_CROP_W=0                         # 0 = use full screen width
COPT_CROP_H=0                         # 0 = use full screen height

# Encoding
COPT_ENCODER=auto                     # auto | vaapi | nvenc | x264 | x265
COPT_PIXEL_FMT=nv12
COPT_FRAMERATE=60
COPT_QUALITY=20                       # CRF/QP (lower = better quality)

# Audio
COPT_AUDIO=1                          # 1 = enabled, 0 = disabled
COPT_AUDIO_CODEC=aac                  # aac | opus | mp3 | copy

# Output
COPT_OUTPUT=/tmp/copt-output.mkv
COPT_DURATION=0                       # 0 = until Ctrl-C

# User config location
COPT_CONFIG=${XDG_CONFIG_HOME:-$HOME/.config}/copt/copt.conf

# Streaming
COPT_YOUTUBE_KEY=${YT_API_KEY:-}      # YouTube stream key from environment
COPT_STREAM_TYPE=rtmp                 # rtmp | hls
COPT_RTMP_URL=rtmps://a.rtmp.youtube.com/live2/
COPT_HLS_URL=
COPT_STREAM_NAME=""                   # Defaults to "copt-stream"

# ---- USB capture mode (UGREEN 25173 / VID:PID 3188:1000 and similar) ------
# Set COPT_CAPTURE_MODE=usb to enable V4L2 device capture instead of kmsgrab.
#
COPT_CAPTURE_MODE=kmsgrab             # kmsgrab | usb
COPT_USB_DEVICE=""                    # V4L2 device path, e.g. /dev/video0 (auto-detect if empty)
COPT_USB_VID_PID="3188:1000"          # USB VID:PID for UGREEN 25173; used for reconnect detection
COPT_USB_INPUT_FORMAT=mjpeg           # V4L2 pixel format: mjpeg (4K USB-C) | yuyv422 (USB 3.0 720p)
COPT_USB_INPUT_W=""                   # Input capture width  (defaults to COPT_OUT_W when empty)
COPT_USB_INPUT_H=""                   # Input capture height (defaults to COPT_OUT_H when empty)

# USB reconnect behaviour (only relevant when COPT_CAPTURE_MODE=usb)
COPT_USB_RECONNECT=1                  # 1 = auto-reconnect on USB disconnect; 0 = exit on disconnect
COPT_USB_MAX_RECONNECTS=0             # 0 = infinite; N = give up after N reconnects
COPT_USB_RECONNECT_TIMEOUT=120        # seconds to wait for device to reappear on bus
COPT_USB_RECONNECT_DELAY=5            # seconds to wait after device reappears before restarting FFmpeg
COPT_USB_SETTLE_DELAY=2               # seconds to let the kernel driver initialise after USB enumeration
