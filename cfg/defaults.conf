# ============================================================================
# copt — Default configuration
# ============================================================================
# All settings are overridable via environment, config file, or CLI flags.
# Priority order: CLI > config file > environment > defaults
# ============================================================================

# Hardware
COPT_DRI_DEVICE=""                    # Auto-detect DRI device
COPT_AUDIO_DEVICE=""                  # Auto-detect ALSA device

# Screen resolution (auto-detected via xrandr/weston-info)
COPT_SCREEN_W=1920
COPT_SCREEN_H=1080

# Output resolution
COPT_OUT_W=1920
COPT_OUT_H=1080

# Crop region
COPT_CROP_X=0
COPT_CROP_Y=0
COPT_CROP_W=0                         # 0 = use full screen width
COPT_CROP_H=0                         # 0 = use full screen height

# Window capture (requires xdotool or wmctrl)
COPT_WINDOW_NAME=""                   # Capture specific window by name (e.g., "The Sims 4")

# Encoding
COPT_ENCODER=auto                     # auto | vaapi | nvenc | x264 | x265
COPT_PIXEL_FMT=nv12
COPT_FRAMERATE=60
COPT_QUALITY=20                       # CRF/QP (lower = better quality)

# Audio
COPT_AUDIO=1                          # 1 = enabled, 0 = disabled
COPT_AUDIO_CODEC=aac                  # aac | opus | mp3 | copy

# Output
COPT_OUTPUT=/tmp/copt-output.mkv
COPT_DURATION=0                       # 0 = until Ctrl-C

# User config location
COPT_CONFIG=${XDG_CONFIG_HOME:-$HOME/.config}/copt/copt.conf

# Streaming
COPT_YOUTUBE_KEY=${YT_API_KEY:-}      # YouTube stream key from environment
COPT_STREAM_TYPE=rtmp                 # rtmp | hls
COPT_RTMP_URL=rtmps://a.rtmp.youtube.com/live2/
COPT_HLS_URL=
COPT_STREAM_NAME=""                   # Defaults to "copt-stream"
